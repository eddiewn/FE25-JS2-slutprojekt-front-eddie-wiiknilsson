<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>fe25-js2-slutprojekt-front-eddie-wiiknilsson</title>
        <link rel="stylesheet" href="./src/style.css" />
    </head>
    <body>
        <div class="add-stuff mt-10 flex justify-evenly text-xs">
            <form
                class="add-member-form flex flex-col w-72 border rounded border-gray-300 p-4 gap-3"
            >
                <h3 class="self-center text-xl">Add Member</h3>
                <div class="flex gap-2">
                    <p class="">Name:</p>
                    <input name="name" type="text" class="border border-gray-300 rounded" />
                </div>
                <div class="flex gap-2">
                    <p>Category:</p>
                    <select name="category" id="" class="border rounded">
                        <option name="" value="UX">UX</option>
                        <option name="" value="Frontend">Frontend-dev</option>
                        <option name="" value="Backend">Backend-dev</option>
                    </select>
                </div>
                <button
                    type="submit"
                    class="p-2 mt-auto bg-blue-600 w-1/2 self-center text-sm rounded text-white hover:opacity-70 cursor-pointer"
                >
                    Add Member
                </button>
            </form>
            <form
                class="add-assignment-form flex flex-col w-72 border rounded border-gray-300 p-4 gap-3"
            >
                <h3 class="self-center text-xl">Add Assignment</h3>
                <div class="flex gap-2">
                    <p class="">Title: </p>
                    <input type="text" name="title" class="border border-gray-300 rounded" />
                </div>
                <div class="flex gap-2">
                    <p class="">Description: </p>
                    <input type="text" name="description" class="border border-gray-300 rounded" />
                </div>
                <div class="flex gap-2">
                    <p>Category:</p>
                    <select name="category" id="" class="border rounded">
                        <option value="UX">UX</option>
                        <option value="Frontend">Frontend-dev</option>
                        <option value="Backend">Backend-dev</option>
                    </select>
                </div>
                <button type="submit"
                    class="p-2  bg-blue-600 w-1/2 self-center text-center text-sm rounded text-white hover:opacity-70 cursor-pointer"
                    >Add Assignment</button
                >
            </form>
        </div>
        <div>
            <h2>ASSIGNMENT BOARD</h1>
        </div>
        <script type="module" src="/src/main.ts"></script>
        <script type="module" src="/src/addAssignment.ts"> </script>
        <script type="module" src="/src/addMember.ts"></script>
    </body>
</html>
